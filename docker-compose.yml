services:
  # Helix AI Studio — メインアプリ
  helix-ai-studio:
    build: .
    ports:
      - "8502:8502"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MEM0_URL=http://mem0:8080
      - MEM0_USER_ID=default
    volumes:
      - studio-data:/app/data
    depends_on:
      ollama:
        condition: service_started
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # Ollama — ローカルLLM推論
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # Qdrant — ベクトルデータベース（Mem0用）
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Mem0 — 共有記憶サーバー
  mem0:
    image: python:3.12-slim
    ports:
      - "8080:8080"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - EMBEDDING_MODEL=qwen3-embedding:8b
      - LLM_MODEL=ministral-3:8b
      - MEM0_COLLECTION=mem0_shared
    volumes:
      - mem0-data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    command: >
      bash -c "
        pip install mem0ai qdrant-client httpx &&
        python -c \"
        from mem0 import Memory
        from http.server import HTTPServer, BaseHTTPRequestHandler
        import json, os

        config = {
            'vector_store': {
                'provider': 'qdrant',
                'config': {
                    'collection_name': os.environ.get('MEM0_COLLECTION', 'mem0_shared'),
                    'url': os.environ.get('QDRANT_URL', 'http://localhost:6333'),
                    'embedding_model_dims': 4096,
                }
            },
            'embedder': {
                'provider': 'ollama',
                'config': {
                    'model': os.environ.get('EMBEDDING_MODEL', 'qwen3-embedding:8b'),
                    'ollama_base_url': os.environ.get('OLLAMA_URL', 'http://localhost:11434'),
                }
            },
            'llm': {
                'provider': 'ollama',
                'config': {
                    'model': os.environ.get('LLM_MODEL', 'ministral-3:8b'),
                    'ollama_base_url': os.environ.get('OLLAMA_URL', 'http://localhost:11434'),
                }
            }
        }
        m = Memory.from_config(config)

        class Handler(BaseHTTPRequestHandler):
            def do_GET(self):
                if self.path == '/health':
                    self._json(200, {'status': 'ok'})
                elif self.path.startswith('/memories'):
                    uid = self.path.split('user_id=')[-1] if 'user_id=' in self.path else 'default'
                    result = m.get_all(user_id=uid)
                    self._json(200, {'memories': result.get('results', [])})
                else:
                    self._json(404, {'error': 'not found'})

            def do_POST(self):
                body = json.loads(self.rfile.read(int(self.headers.get('Content-Length', 0))))
                if self.path == '/add':
                    result = m.add(body.get('text', ''), user_id=body.get('user_id', 'default'))
                    self._json(200, {'status': 'saved', 'result': result})
                elif self.path == '/search':
                    result = m.search(body.get('query', ''), user_id=body.get('user_id', 'default'), limit=body.get('limit', 10))
                    self._json(200, {'results': result.get('results', [])})
                else:
                    self._json(404, {'error': 'not found'})

            def _json(self, code, data):
                self.send_response(code)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                self.wfile.write(json.dumps(data, ensure_ascii=False).encode())

            def log_message(self, *a): pass

        print('Mem0 HTTP server on :8080')
        HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        \"
      "
    restart: unless-stopped

volumes:
  studio-data:
  ollama-data:
  qdrant-data:
  mem0-data:
