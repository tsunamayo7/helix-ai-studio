<!-- 会話一覧コンポーネント -->
<div class="flex-1 overflow-y-auto p-3 space-y-1">
    <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">会話履歴</span>
        <button @click="$store.app.newConversation()"
                class="p-1 rounded hover:bg-slate-700 text-slate-400 hover:text-slate-200 transition-colors"
                title="新規会話">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </button>
    </div>

    <!-- 会話が無い場合 -->
    <template x-if="$store.app.conversations.length === 0">
        <div class="text-center py-6">
            <p class="text-xs text-slate-500">会話がありません</p>
            <p class="text-[10px] text-slate-600 mt-1">新しいチャットを始めましょう</p>
        </div>
    </template>

    <!-- 会話リスト -->
    <template x-for="conv in $store.app.conversations" :key="conv.id">
        <div @click="$store.app.switchConversation(conv.id)"
             :class="$store.app.currentConversationId === conv.id ? 'bg-slate-700 text-slate-100' : 'text-slate-400 hover:bg-slate-700/50 hover:text-slate-300'"
             class="group flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer transition-all duration-200 text-sm">
            <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            <span class="truncate flex-1" x-text="conv.title || '無題の会話'"></span>
            <button @click.stop="$store.app.deleteConversation(conv.id)"
                    class="opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-slate-600 text-slate-500 hover:text-red-400 transition-all"
                    title="削除">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
        </div>
    </template>
</div>
