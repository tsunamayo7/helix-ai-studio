{% extends "base.html" %}

{% block title %}Chat — Helix AI Studio{% endblock %}
{% block nav_chat %}bg-slate-700 text-blue-400 font-medium{% endblock %}

{% block sidebar %}
{% include "components/sidebar.html" %}
{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col overflow-hidden" x-data="{
    input: '',
    providerTab: 'local',
    attachedFiles: [],
    uploading: false,

    async attachFiles(files) {
        if (!files || files.length === 0) return;
        this.uploading = true;
        for (const file of files) {
            const fd = new FormData();
            fd.append('file', file);
            try {
                const r = await fetch('/api/rag/upload', { method: 'POST', body: fd });
                const data = await r.json();
                if (r.ok && data.ok) {
                    this.attachedFiles = [...this.attachedFiles, { name: file.name, doc_id: data.doc_id, chunks: data.chunks }];
                } else {
                    console.warn('Upload rejected:', data.detail || data.error);
                    this.attachedFiles = [...this.attachedFiles, { name: file.name + ' (failed)', doc_id: '', chunks: 0 }];
                }
            } catch (e) {
                console.error('Upload failed:', e);
                this.attachedFiles = [...this.attachedFiles, { name: file.name + ' (error)', doc_id: '', chunks: 0 }];
            }
        }
        this.uploading = false;
    },

    removeFile(idx) { this.attachedFiles.splice(idx, 1); },

    sendWithFiles() {
        if (!this.input.trim() && this.attachedFiles.length === 0) return;
        let msg = this.input;
        if (this.attachedFiles.length > 0) {
            const names = this.attachedFiles.map(f => f.name).join(', ');
            msg = `[Attached: ${names}]\n${msg}`;
        }
        $store.app.sendMessage(msg);
        this.input = '';
        this.attachedFiles = [];
    },
}">

    <!-- ヘッダー -->
    <div class="border-b border-slate-700 bg-slate-800/80 backdrop-blur px-4 py-3">
        <div class="flex items-center gap-4 flex-wrap">

            <!-- プロバイダ切替タブ -->
            <div class="flex bg-slate-900 rounded-lg p-0.5">
                <button @click="providerTab = 'local'; $store.app.provider = 'ollama'; $store.app.loadModels()"
                        :class="providerTab === 'local' ? 'bg-slate-700 text-emerald-400 shadow' : 'text-slate-400 hover:text-slate-300'"
                        class="px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-200"
                        x-text="$store.i18n.t('local')">
                </button>
                <button @click="providerTab = 'cloud'; $store.app.provider = 'claude'; $store.app.loadModels()"
                        :class="providerTab === 'cloud' ? 'bg-slate-700 text-blue-400 shadow' : 'text-slate-400 hover:text-slate-300'"
                        class="px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-200"
                        x-text="$store.i18n.t('cloudApi')">
                </button>
                <button @click="providerTab = 'cli'; $store.app.provider = 'claude_code'; $store.app.loadModels()"
                        :class="providerTab === 'cli' ? 'bg-slate-700 text-purple-400 shadow' : 'text-slate-400 hover:text-slate-300'"
                        class="px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-200"
                        x-text="$store.i18n.t('cli')">
                </button>
            </div>

            <!-- プロバイダ選択（タブに応じて表示） -->
            <select x-show="providerTab === 'local'" x-model="$store.app.provider"
                    @change="$store.app.loadModels()"
                    class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500 transition-colors">
                <option value="ollama">Ollama</option>
                <option value="openai_compat" x-text="$store.i18n.t('openaiCompat')"></option>
            </select>
            <select x-show="providerTab === 'cloud'" x-model="$store.app.provider"
                    @change="$store.app.loadModels()"
                    class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500 transition-colors">
                <option value="claude">Claude API</option>
                <option value="openai">OpenAI API</option>
            </select>
            <select x-show="providerTab === 'cli'" x-model="$store.app.provider"
                    @change="$store.app.loadModels()"
                    class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500 transition-colors">
                <option value="claude_code">Claude Code</option>
                <option value="codex">Codex CLI</option>
                <option value="gemini_cli">Gemini CLI</option>
            </select>

            <!-- モデル選択 -->
            <select x-model="$store.app.model"
                    class="bg-slate-900 border border-slate-600 rounded-lg px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500 transition-colors max-w-[300px]">
                <template x-if="$store.app.availableModels.length === 0">
                    <option value="" x-text="$store.i18n.t('noModels')"></option>
                </template>
                <template x-for="m in $store.app.availableModels" :key="m.value">
                    <option :value="m.value" x-text="m.label"></option>
                </template>
            </select>

            <!-- Mem0 トグル -->
            <button @click="$store.app.mem0Enabled = !$store.app.mem0Enabled"
                    class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all duration-200 ml-auto"
                    :class="$store.app.mem0Enabled
                        ? 'bg-amber-900/40 text-amber-400 border border-amber-700/50 hover:bg-amber-900/60'
                        : 'bg-slate-800 text-slate-500 border border-slate-700 hover:bg-slate-700'">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
                <span>Mem0</span>
                <span class="text-[10px] px-1.5 py-0.5 rounded-full"
                      :class="$store.app.mem0Enabled ? 'bg-amber-700/50 text-amber-300' : 'bg-slate-700 text-slate-500'"
                      x-text="$store.app.mem0Enabled ? 'ON' : 'OFF'"></span>
            </button>

            <!-- 新規会話ボタン -->
            <button @click="$store.app.newConversation()"
                    class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-medium rounded-lg transition-colors duration-200">
                <span x-text="$store.i18n.t('newConversation')"></span>
            </button>
        </div>
    </div>

    <!-- メッセージ領域 -->
    <div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-6 space-y-4"
         x-effect="scrollToBottom('#chat-messages')">

        <!-- 空状態 -->
        <template x-if="$store.app.messages.length === 0">
            <div class="flex flex-col items-center justify-center h-full text-center">
                <div class="w-16 h-16 rounded-2xl bg-slate-800 flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z"/></svg>
                </div>
                <h2 class="text-lg font-semibold text-slate-300 mb-1" x-text="$store.i18n.t('startChatTitle')"></h2>
                <p class="text-sm text-slate-500 max-w-sm" x-text="$store.i18n.t('startChatDesc')"></p>
            </div>
        </template>

        <!-- メッセージ一覧 -->
        <template x-for="(msg, idx) in $store.app.messages" :key="idx">
            <div class="msg-enter" :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">

                <!-- エラーメッセージ -->
                <template x-if="msg.role === 'error'">
                    <div class="max-w-2xl px-4 py-3 rounded-xl bg-red-900/30 border border-red-800 text-red-300 text-sm">
                        <div class="flex items-center gap-2 mb-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                            <span class="font-medium" x-text="$store.i18n.t('error')"></span>
                        </div>
                        <span x-text="msg.content"></span>
                    </div>
                </template>

                <!-- ユーザーメッセージ -->
                <template x-if="msg.role === 'user'">
                    <div class="max-w-2xl">
                        <div class="px-4 py-3 rounded-2xl rounded-br-md text-sm leading-relaxed"
                             style="background: #1e40af;">
                            <span x-text="msg.content" class="whitespace-pre-wrap"></span>
                        </div>
                        <div class="text-[10px] text-slate-500 mt-1 text-right" x-text="msg.timestamp"></div>
                    </div>
                </template>

                <!-- アシスタントメッセージ -->
                <template x-if="msg.role === 'assistant'">
                    <div class="max-w-2xl">
                        <!-- モデル情報ヘッダー -->
                        <template x-if="msg.provider_label && msg.model">
                            <div class="flex items-center gap-2 mb-1.5">
                                <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-medium"
                                     :class="{
                                         'bg-emerald-900/40 text-emerald-400 border border-emerald-800/50': msg.provider_label && (msg.provider_label.startsWith('ローカル') || msg.provider_label.startsWith('Local')),
                                         'bg-blue-900/40 text-blue-400 border border-blue-800/50': msg.provider_label && msg.provider_label.startsWith('Cloud'),
                                         'bg-purple-900/40 text-purple-400 border border-purple-800/50': msg.provider_label && msg.provider_label.startsWith('CLI'),
                                     }">
                                    <template x-if="msg.provider_label && (msg.provider_label.startsWith('ローカル') || msg.provider_label.startsWith('Local'))">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                    </template>
                                    <template x-if="msg.provider_label && msg.provider_label.startsWith('Cloud')">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>
                                    </template>
                                    <template x-if="msg.provider_label && msg.provider_label.startsWith('CLI')">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                    </template>
                                    <span x-text="msg.provider_label"></span>
                                    <span class="text-slate-500">|</span>
                                    <span x-text="msg.model" class="font-mono"></span>
                                </div>
                                <template x-if="msg.duration_ms > 0">
                                    <span class="text-[10px] text-slate-600" x-text="(msg.duration_ms / 1000).toFixed(1) + $store.i18n.t('seconds')"></span>
                                </template>
                            </div>
                        </template>
                        <div class="px-4 py-3 rounded-2xl rounded-bl-md text-sm leading-relaxed markdown-body"
                             style="background: #334155;"
                             :class="{ 'streaming-cursor': $store.app.isStreaming && idx === $store.app.messages.length - 1 && msg.content }">
                            <div x-html="renderMarkdown(msg.content)"></div>
                            <!-- ストリーミング中の空メッセージ -->
                            <template x-if="$store.app.isStreaming && idx === $store.app.messages.length - 1 && !msg.content">
                                <div class="flex gap-1 py-1">
                                    <span class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0ms;"></span>
                                    <span class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 150ms;"></span>
                                    <span class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 300ms;"></span>
                                </div>
                            </template>
                        </div>
                        <div class="text-[10px] text-slate-500 mt-1" x-text="msg.timestamp"></div>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <!-- 入力エリア -->
    <div class="border-t border-slate-700 bg-slate-800/80 backdrop-blur p-4"
         @dragover.prevent="$el.classList.add('ring-2','ring-blue-500/50')"
         @dragleave.prevent="$el.classList.remove('ring-2','ring-blue-500/50')"
         @drop.prevent="$el.classList.remove('ring-2','ring-blue-500/50'); attachFiles($event.dataTransfer.files)">

        <!-- アップロード中インジケータ -->
        <div x-show="uploading" class="max-w-3xl mx-auto mb-2 flex items-center gap-2 text-xs text-blue-400">
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
            <span x-text="$store.i18n.t('uploading')"></span>
        </div>

        <!-- 添付ファイルプレビュー -->
        <div x-show="attachedFiles.length > 0" class="max-w-3xl mx-auto mb-2 flex flex-wrap gap-2">
            <template x-for="(f, idx) in attachedFiles" :key="idx">
                <div class="flex items-center gap-1.5 bg-emerald-900/40 border border-emerald-700/50 rounded-lg px-2.5 py-1.5 text-xs text-emerald-300">
                    <svg class="w-3.5 h-3.5 text-emerald-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <span x-text="f.name" class="max-w-[200px] truncate font-medium"></span>
                    <span class="text-emerald-500/70 text-[10px]" x-text="f.chunks + ' chunks'"></span>
                    <button @click="removeFile(idx)" class="ml-1 text-emerald-500/50 hover:text-red-400 transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </template>
        </div>

        <div class="max-w-3xl mx-auto flex gap-3 items-end">
            <!-- ファイル添付ボタン -->
            <input type="file" x-ref="chatFileInput" multiple class="hidden"
                   accept=".txt,.md,.py,.js,.ts,.json,.yaml,.yml,.toml,.csv,.html,.css,.sh,.sql,.java,.go,.rs,.c,.cpp,.h,.rb,.php,.xml,.pdf,.docx,.pptx,.xlsx,.png,.jpg,.jpeg"
                   @change="attachFiles($event.target.files); $event.target.value=''">
            <button @click="$refs.chatFileInput.click()"
                    :disabled="$store.app.isStreaming"
                    class="p-3 rounded-xl transition-all duration-200 shrink-0 text-slate-400 hover:text-slate-200 hover:bg-slate-700"
                    :title="$store.i18n.t('attachFile')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
            </button>

            <textarea x-model="input"
                      @keydown.enter.prevent="if (!$event.shiftKey) { sendWithFiles(); }"
                      @input="autoResize($el)"
                      :disabled="$store.app.isStreaming"
                      :placeholder="$store.i18n.t('inputPlaceholder')"
                      rows="1"
                      class="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-all duration-200 max-h-[200px] overflow-y-auto"></textarea>
            <button @click="sendWithFiles()"
                    :disabled="(!input.trim() && attachedFiles.length === 0) || $store.app.isStreaming"
                    :class="(input.trim() || attachedFiles.length > 0) && !$store.app.isStreaming ? 'bg-blue-600 hover:bg-blue-500 text-white' : 'bg-slate-700 text-slate-500 cursor-not-allowed'"
                    class="p-3 rounded-xl transition-all duration-200 shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V5m0 0l-7 7m7-7l7 7" transform="rotate(45 12 12)"/></svg>
            </button>
        </div>
    </div>
</div>
{% endblock %}
