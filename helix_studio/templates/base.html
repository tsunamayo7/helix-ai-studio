<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Helix AI Studio{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'] },
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- highlight.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>

    <!-- Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- App CSS -->
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-slate-900 text-slate-200 font-sans h-screen flex" x-data x-init="$store.app.init()">

    <!-- モバイルオーバーレイ -->
    <div x-show="$store.app.sidebarOpen"
         x-transition:enter="transition-opacity duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="$store.app.sidebarOpen = false"
         class="fixed inset-0 bg-black/50 z-20 md:hidden">
    </div>

    <!-- サイドバー -->
    <aside :class="$store.app.sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
           class="fixed md:static z-30 w-64 bg-slate-800 border-r border-slate-700 flex flex-col h-full transition-transform duration-200 md:translate-x-0">

        <!-- ロゴ・タイトル -->
        <div class="p-4 border-b border-slate-700">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center text-white font-bold text-sm">H</div>
                <div>
                    <h1 class="text-base font-bold text-slate-100">Helix AI Studio</h1>
                    <p class="text-[10px] text-slate-400">v2.0 — 統合AI開発環境</p>
                </div>
            </div>
        </div>

        <!-- ナビゲーション -->
        <nav class="p-3 space-y-1">
            <a href="/" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition-all duration-200
                       {% block nav_chat %}text-slate-300 hover:bg-slate-700 hover:text-slate-100{% endblock %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                チャット
            </a>
            <a href="/pipeline" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition-all duration-200
                       {% block nav_pipeline %}text-slate-300 hover:bg-slate-700 hover:text-slate-100{% endblock %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                パイプライン
            </a>
            <a href="/history" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition-all duration-200
                       {% block nav_history %}text-slate-300 hover:bg-slate-700 hover:text-slate-100{% endblock %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                履歴
            </a>
            <a href="/settings" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition-all duration-200
                       {% block nav_settings %}text-slate-300 hover:bg-slate-700 hover:text-slate-100{% endblock %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                設定
            </a>
        </nav>

        <!-- サイドバー拡張（ページ固有） -->
        {% block sidebar %}{% endblock %}

        <!-- 接続状態 -->
        <div class="mt-auto p-3 border-t border-slate-700">
            <div class="flex items-center gap-2 text-xs">
                <span class="relative flex h-2.5 w-2.5">
                    <span :class="$store.app.connected ? 'bg-emerald-400' : 'bg-red-400'"
                          class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"></span>
                    <span :class="$store.app.connected ? 'bg-emerald-500' : 'bg-red-500'"
                          class="relative inline-flex rounded-full h-2.5 w-2.5"></span>
                </span>
                <span :class="$store.app.connected ? 'text-emerald-400' : 'text-red-400'"
                      x-text="$store.app.connected ? '接続中' : '未接続'"></span>
            </div>
        </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- モバイルヘッダー -->
        <div class="md:hidden flex items-center gap-3 p-3 border-b border-slate-700 bg-slate-800">
            <button @click="$store.app.sidebarOpen = !$store.app.sidebarOpen"
                    class="p-1.5 rounded-lg hover:bg-slate-700 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <span class="text-sm font-semibold">Helix AI Studio</span>
        </div>

        {% block content %}{% endblock %}
    </main>

    <!-- App JS -->
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
