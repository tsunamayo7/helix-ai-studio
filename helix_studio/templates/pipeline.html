{% extends "base.html" %}

{% block title %}Pipeline — Helix AI Studio{% endblock %}
{% block nav_pipeline %}bg-slate-700 text-blue-400 font-medium{% endblock %}

{% block content %}
<div class="flex-1 overflow-y-auto" x-data="{
    taskInput: '',
    planModel: '',
    execModel: '',
    verifyModel: '',
    isRunning: false,
    steps: [
        { nameKey: 'planStep', icon: 'cloud', status: 'idle', progress: 0, result: '' },
        { nameKey: 'execStep', icon: 'local', status: 'idle', progress: 0, result: '' },
        { nameKey: 'verifyStep', icon: 'cloud', status: 'idle', progress: 0, result: '' },
    ],
    finalAnswer: '',
    finalAnswerLoading: false,
    history: [],

    // モデル一覧（プロバイダ別）
    cloudModels: [],
    ollamaModels: [],
    modelsLoaded: false,

    // CrewAI関連
    execMode: 'single',
    crewTeams: {},
    selectedTeam: 'dev_team',
    crewAgents: [],
    vramStatus: { loaded_models: {}, total_vram_used_gb: 0 },

    get totalEstimatedVram() {
        if (this.execMode !== 'crew' || !this.crewAgents.length) return 0;
        const seen = {};
        let total = 0;
        for (const a of this.crewAgents) {
            if (!seen[a.model]) {
                seen[a.model] = true;
                total += a.estimated_vram_gb || 0;
            }
        }
        return Math.round(total * 10) / 10;
    },

    // 追加モデルカテゴリ
    cliModels: [],
    compatModels: [],

    async loadModels() {
        try {
            const res = await fetch('/api/models');
            if (!res.ok) return;
            const data = await res.json();

            // Cloud API（claude + openai）
            const cloud = [];
            for (const provider of ['claude', 'openai']) {
                const models = data[provider] || [];
                const prefix = provider === 'claude' ? '[Claude] ' : '[OpenAI] ';
                for (const m of models) {
                    const value = typeof m === 'string' ? m : (m.id || m.name || '');
                    let label = typeof m === 'string' ? m : (m.name || m.id || '');
                    if (typeof m !== 'string' && m.description) label += ` — ${m.description}`;
                    if (value) cloud.push({ value, label: prefix + label });
                }
            }
            this.cloudModels = cloud;

            // CLI（claude_code + codex + gemini_cli）
            const cli = [];
            for (const provider of ['claude_code', 'codex', 'gemini_cli']) {
                const models = data[provider] || [];
                const prefixMap = { claude_code: '[Claude Code] ', codex: '[Codex] ', gemini_cli: '[Gemini] ' };
                for (const m of models) {
                    const value = typeof m === 'string' ? m : (m.id || m.name || '');
                    let label = typeof m === 'string' ? m : (m.name || m.id || '');
                    if (typeof m !== 'string' && m.description) label += ` — ${m.description}`;
                    if (value) cli.push({ value, label: (prefixMap[provider] || '') + label, provider });
                }
            }
            this.cliModels = cli;

            // Ollama
            const ollama = [];
            for (const m of (data['ollama'] || [])) {
                const value = typeof m === 'string' ? m : (m.name || m.id || '');
                let label = typeof m === 'string' ? m : (m.name || m.id || '');
                if (typeof m !== 'string' && m.size) label += ` (${m.size})`;
                if (value) ollama.push({ value, label });
            }
            this.ollamaModels = ollama;

            // OpenAI互換
            const compat = [];
            for (const m of (data['openai_compat'] || [])) {
                const value = typeof m === 'string' ? m : (m.name || m.id || '');
                let label = typeof m === 'string' ? m : (m.name || m.id || '');
                if (value) compat.push({ value, label: '[' + Alpine.store('i18n').t('compatLabel') + '] ' + label });
            }
            this.compatModels = compat;

            this.modelsLoaded = true;
        } catch (e) {
            console.error(Alpine.store('i18n').t('modelLoadError'), e);
        }
    },

    async loadCrewTeams() {
        try {
            const res = await fetch('/api/crew/teams');
            if (!res.ok) return;
            const data = await res.json();
            this.crewTeams = data.teams || {};
            this.updateCrewAgents();
        } catch (e) {
            console.error(Alpine.store('i18n').t('crewTeamLoadError'), e);
        }
    },

    async loadVramStatus() {
        try {
            const res = await fetch('/api/crew/vram');
            if (!res.ok) return;
            this.vramStatus = await res.json();
        } catch (e) {
            console.error(Alpine.store('i18n').t('vramStatusError'), e);
        }
    },

    updateCrewAgents() {
        const team = this.crewTeams[this.selectedTeam];
        if (team) {
            // ディープコピーして個別に編集可能にする
            this.crewAgents = team.map(a => ({ ...a }));
        } else {
            this.crewAgents = [];
        }
    },

    updateAgentVram(index) {
        const agent = this.crewAgents[index];
        if (!agent) return;
        // モデル名からVRAM推定値を再計算（簡易版）
        const sizeMap = {
            '120b': 75, '122b': 76, '123b': 70,
            '80b': 47, '27b': 16, '30b': 23,
            '14b': 9, '8b': 6, '7b': 6,
            '4b': 3, '3b': 3,
        };
        let estimated = 10;
        for (const [suffix, gb] of Object.entries(sizeMap)) {
            if (agent.model.includes(suffix)) {
                estimated = gb;
                break;
            }
        }
        agent.estimated_vram_gb = estimated;
    },

    async runPipeline() {
        if (!this.taskInput.trim() || this.isRunning) return;
        this.isRunning = true;
        this.finalAnswer = '';
        this.finalAnswerLoading = false;
        this.steps.forEach(s => { s.status = 'idle'; s.progress = 0; s.result = ''; });

        try {
            // Backend expects: title, input_text, step1_model, step2_model, step3_model
            const payload = {
                title: this.taskInput.substring(0, 100),
                input_text: this.taskInput,
                step1_model: this.planModel,
                step2_model: this.execModel,
                step3_model: this.verifyModel,
            };

            this.steps[0].status = 'running';
            this.steps[0].progress = 10;

            const res = await fetch('/api/pipeline/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || 'Pipeline start failed');
            }

            const data = await res.json();
            const runId = data.id;

            // Poll for status until complete
            let attempts = 0;
            while (attempts < 120) { // max 2 minutes
                await new Promise(r => setTimeout(r, 1000));
                attempts++;

                try {
                    const statusRes = await fetch(`/api/pipeline/${runId}`);
                    if (!statusRes.ok) continue;
                    const status = await statusRes.json();

                    // Update step UI based on current_step
                    const currentStep = status.current_step || 0;
                    for (let i = 0; i < 3; i++) {
                        if (i < currentStep) {
                            this.steps[i].status = 'done';
                            this.steps[i].progress = 100;
                        } else if (i === currentStep && status.status === 'running') {
                            this.steps[i].status = 'running';
                            this.steps[i].progress = 50;
                        }
                    }

                    // Fill results from status
                    if (status.step1_result) this.steps[0].result = status.step1_result;
                    if (status.step2_result) this.steps[1].result = status.step2_result;
                    if (status.step3_result) this.steps[2].result = status.step3_result;

                    // Step4: Final answer
                    if (status.current_step >= 4 && !status.step4_result) {
                        this.finalAnswerLoading = true;
                    }
                    if (status.step4_result) {
                        this.finalAnswer = status.step4_result;
                        this.finalAnswerLoading = false;
                    }

                    if (status.status === 'completed' || status.status === 'failed') {
                        this.steps.forEach((s, i) => {
                            if (status.status === 'completed') {
                                s.status = 'done';
                                s.progress = 100;
                            } else if (i >= currentStep) {
                                s.status = 'error';
                            }
                        });
                        if (status.error) {
                            this.steps[Math.min(currentStep, 2)].result = status.error;
                        }
                        break;
                    }
                } catch (e) { /* polling error, retry */ }
            }
        } catch (e) {
            console.error('Pipeline error:', e);
            this.steps[0].status = 'error';
            this.steps[0].result = e.message;
        }

        this.isRunning = false;
        await this.loadHistory();
    },

    async loadHistory() {
        try {
            const res = await fetch('/api/pipeline/history/list');
            if (res.ok) {
                const data = await res.json();
                this.history = Array.isArray(data) ? data : (data.history || []);
            }
        } catch (e) {}
    }
}" x-init="loadHistory(); loadModels(); loadCrewTeams(); loadVramStatus()">

    <!-- ヘッダー -->
    <div class="border-b border-slate-700 bg-slate-800/80 backdrop-blur px-6 py-4">
        <h2 class="text-lg font-semibold text-slate-100" x-text="$store.i18n.t('aiPipeline')"></h2>
        <p class="text-xs text-slate-400 mt-0.5" x-text="$store.i18n.t('pipelineDesc')"></p>
    </div>

    <div class="p-6 max-w-5xl mx-auto space-y-6">

        <!-- 入力エリア -->
        <div class="bg-slate-800 rounded-xl p-5 border border-slate-700">
            <label class="block text-sm font-medium text-slate-300 mb-2" x-text="$store.i18n.t('taskDescription')"></label>
            <textarea x-model="taskInput"
                      :placeholder="$store.i18n.t('taskPlaceholder')"
                      rows="3"
                      class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors"></textarea>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-4">
                <!-- Step1: 計画モデル -->
                <div>
                    <label class="block text-xs text-slate-400 mb-1" x-text="$store.i18n.t('step1PlanModel')"></label>
                    <select x-model="planModel"
                            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
                        <option value="" x-text="$store.i18n.t('default')"></option>
                        <optgroup label="Cloud API" x-show="cloudModels.length > 0">
                            <template x-for="m in cloudModels" :key="'p-cloud-'+m.value">
                                <option :value="m.value" x-text="m.label"></option>
                            </template>
                        </optgroup>
                        <optgroup label="CLI" x-show="cliModels.length > 0">
                            <template x-for="m in cliModels" :key="'p-cli-'+m.value">
                                <option :value="m.value" x-text="m.label"></option>
                            </template>
                        </optgroup>
                        <optgroup label="Ollama" x-show="ollamaModels.length > 0">
                            <template x-for="m in ollamaModels" :key="'p-ollama-'+m.value">
                                <option :value="m.value" x-text="m.label"></option>
                            </template>
                        </optgroup>
                    </select>
                </div>

                <!-- Step2: Exec Model -->
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="text-xs text-slate-400" x-text="$store.i18n.t('step2ExecModel')"></label>
                        <div class="flex bg-slate-900 rounded p-0.5">
                            <button @click="execMode = 'single'"
                                    :class="execMode === 'single' ? 'bg-emerald-600 text-white shadow' : 'text-slate-500 hover:text-slate-300'"
                                    class="text-[10px] px-2 py-0.5 rounded transition-all"
                                    x-text="$store.i18n.t('single')">
                            </button>
                            <button @click="execMode = 'crew'"
                                    :class="execMode === 'crew' ? 'bg-purple-600 text-white shadow' : 'text-slate-500 hover:text-slate-300'"
                                    class="text-[10px] px-2 py-0.5 rounded transition-all"
                                    x-text="$store.i18n.t('crewai')">
                            </button>
                        </div>
                    </div>
                    <select x-show="execMode === 'single'" x-model="execModel"
                            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-emerald-500">
                        <option value="" x-text="$store.i18n.t('default')"></option>
                        <optgroup label="Ollama">
                            <template x-for="m in ollamaModels" :key="'e-ollama-'+m.value">
                                <option :value="m.value" x-text="m.label"></option>
                            </template>
                        </optgroup>
                        <optgroup :label="$store.i18n.t('openaiCompat')" x-show="compatModels.length > 0">
                            <template x-for="m in compatModels" :key="'e-compat-'+m.value">
                                <option :value="m.value" x-text="m.label"></option>
                            </template>
                        </optgroup>
                    </select>
                    <select x-show="execMode === 'crew'" x-model="selectedTeam"
                            @change="updateCrewAgents()"
                            class="w-full bg-slate-900 border border-purple-600/50 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-purple-500">
                        <template x-for="(agents, name) in crewTeams" :key="name">
                            <option :value="name" x-text="name.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase())"></option>
                        </template>
                    </select>
                </div>

                <!-- Step3: 検証モデル -->
                <div>
                    <label class="block text-xs text-slate-400 mb-1" x-text="$store.i18n.t('step3VerifyModel')"></label>
                    <select x-model="verifyModel"
                            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-blue-500">
                        <option value="" x-text="$store.i18n.t('default')"></option>
                        <optgroup label="Cloud API" x-show="cloudModels.length > 0">
                            <template x-for="m in cloudModels" :key="'v-cloud-'+m.value">
                                <option :value="m.value" x-text="m.label"></option>
                            </template>
                        </optgroup>
                        <optgroup label="CLI" x-show="cliModels.length > 0">
                            <template x-for="m in cliModels" :key="'v-cli-'+m.value">
                                <option :value="m.value" x-text="m.label"></option>
                            </template>
                        </optgroup>
                        <optgroup label="Ollama" x-show="ollamaModels.length > 0">
                            <template x-for="m in ollamaModels" :key="'v-ollama-'+m.value">
                                <option :value="m.value" x-text="m.label"></option>
                            </template>
                        </optgroup>
                    </select>
                </div>
            </div>

            <!-- CrewAI エージェント詳細パネル -->
            <template x-if="execMode === 'crew' && crewAgents.length > 0">
                <div class="mt-4 bg-slate-900 rounded-xl p-4 border border-purple-600/30">
                    <div class="flex items-center justify-between mb-3">
                        <h4 class="text-xs font-semibold text-purple-300" x-text="$store.i18n.t('crewAgentConfig')"></h4>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-slate-500" x-text="$store.i18n.t('estimatedVram')"></span>
                            <span class="text-xs font-mono"
                                  :class="totalEstimatedVram > 92 ? 'text-red-400' : totalEstimatedVram > 60 ? 'text-amber-400' : 'text-emerald-400'"
                                  x-text="totalEstimatedVram + ' GB'"></span>
                            <template x-if="vramStatus.total_vram_used_gb > 0">
                                <span class="text-[10px] text-slate-500">(<span x-text="$store.i18n.t('currentlyUsed')"></span> <span x-text="vramStatus.total_vram_used_gb"></span> GB)</span>
                            </template>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <template x-for="(agent, idx) in crewAgents" :key="agent.name">
                            <div class="flex items-center gap-3 bg-slate-800 rounded-lg px-3 py-2">
                                <div class="flex-shrink-0 w-6 h-6 rounded-full bg-purple-500/20 flex items-center justify-center">
                                    <span class="text-[10px] font-bold text-purple-300" x-text="(idx+1)"></span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="text-xs font-medium text-slate-200" x-text="agent.role"></div>
                                    <div class="text-[10px] text-slate-500" x-text="agent.name"></div>
                                </div>
                                <select :value="agent.model"
                                        @change="agent.model = $event.target.value; updateAgentVram(idx)"
                                        class="bg-slate-900 border border-slate-600 rounded px-2 py-1 text-[11px] text-slate-200 focus:outline-none focus:border-purple-500 max-w-[180px]">
                                    <template x-for="m in ollamaModels" :key="'crew'+agent.name+m.value">
                                        <option :value="m.value" x-text="m.label" :selected="m.value === agent.model"></option>
                                    </template>
                                </select>
                                <span class="text-[10px] text-slate-500 w-12 text-right" x-text="(agent.estimated_vram_gb || 0) + 'GB'"></span>
                            </div>
                        </template>
                    </div>
                    <!-- VRAM使用量バー -->
                    <div class="mt-3">
                        <div class="flex justify-between text-[10px] text-slate-500 mb-1">
                            <span x-text="$store.i18n.t('vramUsage')"></span>
                            <span x-text="totalEstimatedVram + ' / ' + (vramStatus.total_vram_gb || 96) + ' GB'"></span>
                        </div>
                        <div class="w-full bg-slate-700 rounded-full h-1.5">
                            <div class="h-1.5 rounded-full transition-all duration-500"
                                 :class="totalEstimatedVram > 92 ? 'bg-red-500' : totalEstimatedVram > 60 ? 'bg-amber-500' : 'bg-purple-500'"
                                 :style="'width: ' + Math.min(100, (totalEstimatedVram / (vramStatus.total_vram_gb || 96)) * 100) + '%'"></div>
                        </div>
                    </div>
                </div>
            </template>

            <button @click="runPipeline()"
                    :disabled="!taskInput.trim() || isRunning"
                    :class="taskInput.trim() && !isRunning ? 'bg-blue-600 hover:bg-blue-500' : 'bg-slate-700 text-slate-500 cursor-not-allowed'"
                    class="mt-4 px-6 py-2.5 text-white text-sm font-medium rounded-xl transition-all duration-200">
                <span x-show="!isRunning" x-text="$store.i18n.t('runPipeline')"></span>
                <span x-show="isRunning" class="flex items-center gap-2">
                    <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                    <span x-text="$store.i18n.t('running')"></span>
                </span>
            </button>
        </div>

        <!-- 3ステップカード -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <template x-for="(step, i) in steps" :key="i">
                <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 transition-all duration-300"
                     :class="step.status === 'running' ? 'border-blue-500/50 shadow-lg shadow-blue-500/10' : step.status === 'done' ? 'border-emerald-500/30' : ''">

                    <!-- ステップヘッダー -->
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center"
                             :class="step.icon === 'cloud' ? 'bg-blue-500/10 text-blue-400' : 'bg-emerald-500/10 text-emerald-400'">
                            <!-- Cloud アイコン -->
                            <template x-if="step.icon === 'cloud'">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>
                            </template>
                            <!-- Local アイコン -->
                            <template x-if="step.icon === 'local'">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            </template>
                        </div>
                        <div>
                            <div class="text-xs text-slate-500" x-text="'Step ' + (i + 1)"></div>
                            <div class="text-sm font-semibold text-slate-200" x-text="$store.i18n.t(step.nameKey)"></div>
                        </div>
                        <!-- ステータスバッジ -->
                        <div class="ml-auto">
                            <span x-show="step.status === 'idle'" class="text-[10px] px-2 py-0.5 rounded-full bg-slate-700 text-slate-400" x-text="$store.i18n.t('statusIdle')"></span>
                            <span x-show="step.status === 'running'" class="text-[10px] px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-400" x-text="$store.i18n.t('statusRunning')"></span>
                            <span x-show="step.status === 'done'" class="text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-400" x-text="$store.i18n.t('statusDone')"></span>
                            <span x-show="step.status === 'error'" class="text-[10px] px-2 py-0.5 rounded-full bg-red-500/20 text-red-400" x-text="$store.i18n.t('statusError')"></span>
                        </div>
                    </div>

                    <!-- 進捗バー -->
                    <div class="w-full bg-slate-700 rounded-full h-1.5 mb-3">
                        <div class="h-1.5 rounded-full transition-all duration-500"
                             :class="step.status === 'done' ? 'bg-emerald-500' : 'bg-blue-500'"
                             :style="'width: ' + step.progress + '%'"></div>
                    </div>

                    <!-- ステップ状態表示（実行中はアニメーションのみ） -->
                    <div class="text-xs text-slate-400 min-h-[40px]">
                        <template x-if="step.status === 'idle'">
                            <span class="text-slate-600" x-text="$store.i18n.t('resultPlaceholder')"></span>
                        </template>
                        <template x-if="step.status === 'running'">
                            <div class="flex gap-1 py-2">
                                <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 0ms;"></span>
                                <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 150ms;"></span>
                                <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 300ms;"></span>
                            </div>
                        </template>
                        <template x-if="step.status === 'done'">
                            <span class="text-emerald-400">&#10003;</span>
                        </template>
                        <template x-if="step.status === 'error'">
                            <span class="text-red-400" x-text="step.result || 'Error'"></span>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <!-- Step4: 最終回答（大きく表示） -->
        <div x-show="finalAnswer || finalAnswerLoading" x-transition class="bg-slate-800 rounded-xl border-2 border-emerald-500/50 overflow-hidden shadow-lg shadow-emerald-500/5">
            <div class="px-5 py-3 border-b border-emerald-500/30 bg-emerald-500/5 flex items-center gap-2">
                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <h3 class="text-base font-bold text-emerald-300" x-text="$store.i18n.t('finalAnswer')"></h3>
                <span class="text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-400">Step 4</span>
            </div>
            <div class="p-6">
                <template x-if="finalAnswerLoading">
                    <div class="flex items-center gap-3 text-sm text-blue-400">
                        <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                        <span x-text="$store.i18n.t('generatingFinalAnswer')"></span>
                    </div>
                </template>
                <template x-if="finalAnswer">
                    <div class="text-sm text-slate-200 markdown-body leading-relaxed" x-html="renderMarkdown(finalAnswer)"></div>
                </template>
            </div>
        </div>

        <!-- 各ステップ詳細（折りたたみ） -->
        <template x-if="steps.some(s => s.result)">
            <details class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                <summary class="px-5 py-3 cursor-pointer text-sm font-medium text-slate-400 hover:text-slate-200 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    <span x-text="$store.i18n.t('stepDetails')"></span>
                </summary>
                <div class="divide-y divide-slate-700">
                    <template x-for="(step, i) in steps" :key="'detail-'+i">
                        <div x-show="step.result" class="p-5">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-xs font-medium text-slate-400" x-text="'Step ' + (i+1) + ': ' + $store.i18n.t(step.nameKey)"></span>
                            </div>
                            <div class="text-xs text-slate-400 markdown-body max-h-[300px] overflow-y-auto" x-html="renderMarkdown(step.result)"></div>
                        </div>
                    </template>
                </div>
            </details>
        </template>

        <!-- 実行履歴 -->
        <div class="bg-slate-800 rounded-xl border border-slate-700">
            <div class="px-5 py-3 border-b border-slate-700">
                <h3 class="text-sm font-semibold text-slate-300" x-text="$store.i18n.t('executionHistory')"></h3>
            </div>
            <div class="divide-y divide-slate-700">
                <template x-if="history.length === 0">
                    <div class="px-5 py-8 text-center text-xs text-slate-500" x-text="$store.i18n.t('noExecutionHistory')">
                    </div>
                </template>
                <template x-for="(item, idx) in history" :key="'hist-'+idx">
                    <div class="px-5 py-3 hover:bg-slate-700/30 transition-colors">
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-slate-300 truncate" x-text="item.title || item.task || 'Pipeline'"></span>
                            <div class="flex items-center gap-2 shrink-0 ml-3">
                                <span class="text-[10px] px-1.5 py-0.5 rounded-full"
                                      :class="item.status === 'completed' ? 'bg-emerald-500/20 text-emerald-400' : item.status === 'failed' ? 'bg-red-500/20 text-red-400' : 'bg-slate-700 text-slate-400'"
                                      x-text="item.status || ''"></span>
                                <span class="text-[10px] text-slate-500" x-text="item.created_at || item.timestamp || ''"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>
{% endblock %}
